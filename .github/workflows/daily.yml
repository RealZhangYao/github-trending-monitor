name: Daily Trending

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 1:00 (北京时间 9:00)
  workflow_dispatch:  # 手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape trending
        run: python scrape.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md trending.json
          git diff --staged --quiet || git commit -m "Update trending $(date +%Y-%m-%d)"
          git push

      - name: Create issue for email notification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          # 检查今天是否已经发过
          EXISTING=$(gh issue list --search "GitHub Trending $TODAY in:title" --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "GitHub Trending 日报 - $TODAY" \
              --body-file issue_body.md \
              --label "daily-report"
            echo "Issue created!"
          else
            echo "Issue already exists: #$EXISTING"
          fi
